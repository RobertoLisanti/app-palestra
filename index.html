<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>AndyGym</title>
  <meta name="theme-color" content="#0b0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AndyGym" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=35" />
  <style>
    /* critico: embedded per evitare cache file:// su browser locale */
    .prog { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
    .prog-row { display: flex !important; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--line); }
    .prog-row.editable { cursor: pointer; border-radius: 10px; }
    .prog-row.editable:active { background: rgba(255,255,255,.03); }
    .prog-row:last-child { border-bottom: none; padding-bottom: 0; }
    .wbadge { flex: none !important; width: 42px; text-align: center; font-weight: 800; font-size: 12.5px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 6px 0; }
    .prog-body { flex: 1 !important; min-width: 0; }
    .target { font-size: 15px; font-weight: 650; color: var(--text); }
    .target.empty { color: var(--muted-2); font-weight: 500; font-style: italic; }
    .prog-row.sem-verde .wbadge { background: rgba(53,208,127,.14); border-color: rgba(53,208,127,.45); color: var(--ok); }
    .prog-row.sem-giallo .wbadge { background: rgba(255,197,61,.14); border-color: rgba(255,197,61,.45); color: var(--warn); }
    .prog-row.sem-arancio .wbadge { background: rgba(255,140,59,.14); border-color: rgba(255,140,59,.45); color: var(--arancio); }
    .prog-row.sem-rosso .wbadge { background: rgba(255,93,93,.14); border-color: rgba(255,93,93,.45); color: var(--bad); }
    .logline { margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .logval { font-size: 14.5px; font-weight: 700; color: var(--text); }
    .logval.muted { color: var(--muted); font-weight: 600; }
    .logts { font-size: 11.5px; color: var(--muted-2); font-weight: 600; margin-left: auto; }
    .lognote { width: 100%; font-size: 13px; color: var(--muted); }
    .logedit { align-self: center; color: var(--muted-2); display: flex; }
    .addlog { align-self: center; white-space: nowrap; font-size: 11.5px; font-weight: 800; color: var(--accent); background: rgba(198,251,80,.10); border: 1px solid rgba(198,251,80,.22); padding: 5px 10px; border-radius: 999px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark"></span>
          <div class="brand-text">
            <h1 id="topTitle">AndyGym</h1>
            <p id="topSub" class="muted"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" class="icon-btn" title="Aggiorna" aria-label="Aggiorna">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
          <div id="accountSlot" class="account-slot"></div>
        </div>
      </div>
    </header>

    <!-- Scrollable content -->
    <main id="view"></main>

    <!-- Bottom navigation -->
    <nav class="tabbar">
      <button class="tab is-active" data-view="home">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-view="attuale">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="3" y="9" width="3.5" height="6" rx="1"/><rect x="17.5" y="9" width="3.5" height="6" rx="1"/><path d="M6.5 12h11"/></svg>
        <span>Attuale</span>
      </button>
      <button class="tab" data-view="storico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        <span>Storico</span>
      </button>
    </nav>
  </div>

  <div id="overlay" class="overlay-host" hidden></div>
  <div id="toast" class="toast"></div>
  <script src="config.js?v=35"></script>
  <script src="vendor/supabase.js"></script>
  <script src="app.js?v=35"></script>
  <script src="auth.js?v=35"></script>
</body>
</html>
