<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Palestra</title>
  <meta name="theme-color" content="#0b0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Palestra" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark"></span>
          <div class="brand-text">
            <h1 id="topTitle">Palestra</h1>
            <p id="topSub" class="muted"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" class="icon-btn" title="Aggiorna" aria-label="Aggiorna">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
          <div id="accountSlot" class="account-slot"></div>
        </div>
      </div>
    </header>

    <!-- Scrollable content -->
    <main id="view"></main>

    <!-- Bottom navigation -->
    <nav class="tabbar">
      <button class="tab is-active" data-view="attuale">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="3" y="9" width="3.5" height="6" rx="1"/><rect x="17.5" y="9" width="3.5" height="6" rx="1"/><path d="M6.5 12h11"/></svg>
        <span>Attuale</span>
      </button>
      <button class="tab" data-view="storico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        <span>Storico</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>
  <script src="config.js"></script>
  <script src="vendor/supabase.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
